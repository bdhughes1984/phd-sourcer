<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhD Sourcer â Find CS PhD Graduates</title>
<meta name="description" content="Search former PhD students from top CS programs in HPC, Systems, Architecture and more.">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3345;
    --text: #e4e6ef;
    --text-dim: #8b8fa3;
    --accent: #6c8cff;
    --accent-dim: #4a6ad4;
    --green: #4ade80;
    --yellow: #fbbf24;
    --red: #f87171;
    --orange: #fb923c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }

  .header {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .header-left p {
    color: var(--text-dim);
    font-size: 14px;
    margin-top: 4px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-right a {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    transition: all 0.15s;
  }
  .header-right a:hover {
    color: var(--text);
    border-color: var(--accent-dim);
  }

  .loading-bar {
    height: 3px;
    background: var(--border);
    overflow: hidden;
  }
  .loading-bar.active {
    background: linear-gradient(90deg, var(--accent) 0%, var(--accent-dim) 50%, var(--accent) 100%);
    background-size: 200% 100%;
    animation: loading 1.5s ease-in-out infinite;
  }
  @keyframes loading {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .toolbar {
    padding: 12px 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .toolbar-label {
    color: var(--text-dim);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }

  .upload-btn {
    padding: 6px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .upload-btn:hover { color: var(--text); border-color: var(--accent-dim); }

  .upload-btn input[type="file"] { display: none; }

  .controls {
    display: flex;
    gap: 12px;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-wrap: wrap;
    align-items: center;
  }

  .search-box {
    flex: 1;
    min-width: 200px;
    padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text-dim); }

  select {
    padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    cursor: pointer;
    min-width: 150px;
  }
  select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); color: var(--text); }

  .stats {
    padding: 12px 32px;
    background: var(--bg);
    color: var(--text-dim);
    font-size: 13px;
    display: flex;
    gap: 24px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .stat-value {
    color: var(--text);
    font-weight: 600;
  }

  .table-wrap {
    overflow-x: auto;
    padding: 0 16px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--surface);
    padding: 12px 16px;
    text-align: left;
    font-weight: 600;
    color: var(--text-dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { color: var(--text); }
  thead th .sort-arrow { margin-left: 4px; font-size: 10px; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:hover { background: var(--surface2); }

  td {
    padding: 10px 16px;
    vertical-align: top;
    max-width: 250px;
  }

  .name-cell {
    font-weight: 500;
    color: var(--text);
  }

  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    margin: 1px 2px;
  }

  .tag-area { background: rgba(108, 140, 255, 0.15); color: var(--accent); }
  .tag-confidence-high { background: rgba(74, 222, 128, 0.15); color: var(--green); }

    if (typeof va === 'number' && typeof vb === 'number') return (va - vb) * sortDir;
    if (Array.isArray(va)) va = va.join(', ');
    if (Array.isArray(vb)) vb = vb.join(', ');
    return String(va).localeCompare(String(vb)) * sortDir;
  });
}

// ââ Rendering ââââââââââââââââââââââââââââââââââââ

function renderTable() {
  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');
  const noRes = document.getElementById('noResults');

  if (allStudents.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    noRes.style.display = 'none';
    return;
  }

  empty.style.display = 'none';

  if (filteredStudents.length === 0) {
    tbody.innerHTML = '';
    noRes.style.display = 'block';
    return;
  }

  noRes.style.display = 'none';

  const limit = 500;
  const toRender = filteredStudents.slice(0, limit);

  tbody.innerHTML = toRender.map(s => {
    const areaTags = (s.areas || []).map(a => `<span class="tag tag-area">${esc(a)}</span>`).join('');
    const confClass = `tag-confidence-${s.confidence || 'low'}`;
    const name = esc(s.name || '');
    const nameQ = encodeURIComponent(s.name || '');

    return `<tr>
      <td class="name-cell">${name}</td>
      <td>${esc(s.university || '')}</td>
      <td>${esc(s.advisor || '')}</td>
      <td>${areaTags}</td>
      <td><span class="tag ${confClass}">${esc(s.confidence || 'unknown')}</span></td>
      <td class="year-cell">${s.coauthor_count || '\u2014'}</td>
      <td class="year-cell">${s.graduation_year_est || '\u2014'}</td>
      <td>
        <a class="link-btn" href="https://www.linkedin.com/search/results/people/?keywords=${nameQ}" target="_blank" rel="noopener">LinkedIn</a>
        <a class="link-btn" href="https://scholar.google.com/scholar?q=author%3A%22${nameQ}%22" target="_blank" rel="noopener">Scholar</a>
        <a class="link-btn" href="https://dblp.org/search?q=${nameQ}" target="_blank" rel="noopener">DBLP</a>
      </td>
    </tr>`;
  }).join('');

  if (filteredStudents.length > limit) {
    tbody.innerHTML += `<tr><td colspan="8" style="text-align:center; color:var(--text-dim); padding:16px;">
      Showing first ${limit} of ${filteredStudents.length} results. Use filters to narrow down.
    </td></tr>`;
  }
}

function updateStats() {
  document.getElementById('showCount').textContent = filteredStudents.length;
  document.getElementById('totalCount').textContent = allStudents.length;
  document.getElementById('univCount').textContent = new Set(filteredStudents.map(s => s.university)).size;
  document.getElementById('advisorCount').textContent = new Set(filteredStudents.map(s => s.advisor)).size;
}

function esc(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ââ Events âââââââââââââââââââââââââââââââââââââââ

document.getElementById('searchBox').addEventListener('input', debounce(applyFilters, 200));
document.getElementById('filterUniv').addEventListener('change', applyFilters);
document.getElementById('filterArea').addEventListener('change', applyFilters);
document.getElementById('filterConfidence').addEventListener('change', applyFilters);
document.getElementById('filterYear').addEventListener('change', applyFilters);

// Column sorting
document.querySelectorAll('thead th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.sort;
    if (sortCol === col) { sortDir *= -1; }
    else { sortCol = col; sortDir = col === 'name' ? 1 : -1; }
    document.querySelectorAll('thead th .sort-arrow').forEach(a => a.textContent = '');
    th.querySelector('.sort-arrow').textContent = sortDir === 1 ? '\u25B2' : '\u25BC';
    applyFilters();
  });
});

// Export
document.getElementById('exportBtn').addEventListener('click', () => {
  const headers = ['name', 'university', 'advisor', 'areas', 'confidence', 'coauthor_count', 'graduation_year_est', 'active_years', 'venues', 'sources'];
  const rows = filteredStudents.map(s => {
    return headers.map(h => {
      let v = s[h];
      if (Array.isArray(v)) v = v.join('; ');
      if (v === null || v === undefined) v = '';
      v = String(v);
      if (v.includes(',') || v.includes('"') || v.includes('\n')) {
        v = '"' + v.replace(/"/g, '""') + '"';
      }
      return v;
    }).join(',');
  });
  const csv = headers.join(',') + '\n' + rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `phd_candidates_filtered_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
});

function debounce(fn, ms) {
  let timer;
  return function(...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), ms);
  };
}
